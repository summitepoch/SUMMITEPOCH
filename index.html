<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summit Epoch</title>

<meta name="description" content="Summit Epoch">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

background:#000;
color:#fff;

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
Helvetica,
Arial,
sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:40px;

}

.container{

max-width:760px;
width:100%;
text-align:center;

animation:fade 1.2s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.logo{

font-size:64px;
font-weight:600;
letter-spacing:-2px;

margin-bottom:22px;

}

.subtitle{

font-size:24px;

opacity:.88;

margin-bottom:10px;

}

.tagline{

font-size:20px;

opacity:.55;

margin-bottom:70px;

font-style:italic;

}

.section{

font-size:13px;

letter-spacing:4px;

opacity:.45;

margin-bottom:28px;

text-transform:uppercase;

}

.item{

margin:18px 0;

font-size:20px;

transition:.25s;

}

.item:hover{

opacity:.65;

}

a{

color:white;

text-decoration:none;

}

.username{

opacity:.55;

margin-left:8px;

}

.footer{

margin-top:80px;

font-size:13px;

opacity:.28;

}

@media(max-width:700px){

.logo{

font-size:44px;

}

.subtitle{

font-size:19px;

}

.tagline{

font-size:16px;

}

.item{

font-size:17px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

Summit Epoch

</div>

<div class="subtitle">

Building the next EPOCH.

</div>

<div class="tagline">

This is not the summit of SUMMIT.

</div>

<div class="section">

Official Channels

</div>

<div class="item">

<a href="https://t.me/SUMMITEPOCH" target="_blank">

@SUMMITEPOCH

</span>

</a>

</div>

<div class="item">

X

<span class="username">

@SUMMITEPOCH

</span>

</div>

<div class="item">

Instagram

<span class="username">

SUMMITEPOCH

</span>

</div>

<div class="item">

YouTube

<span class="username">

@SUMMITEPOCH

</span>

</div>

<div class="item">

</div>

</div>

</div>

</body>
